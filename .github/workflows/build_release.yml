name: Generate Plugin ZIP
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      # 1. Physical installation of the production vendor folder
      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # 2. Bundle everything into a folder first
      - name: Prepare Bundle
        run: |
          mkdir -p fatalflow
          # Copying directories
          cp -r src vendor languages fatalflow/
          # Explicitly copying individual files to ensure they are picked up
          cp fatalflow.php readme.txt composer.json fatalflow/
          # Optional: If you have a package.json or other configs
          # cp package.json fatalflow/ 2>/dev/null || true

      # 3. Create the actual ZIP
      # Using -r (recursive) and -9 (max compression)
      - name: Create ZIP
        run: zip -r9 fatalflow.zip fatalflow/