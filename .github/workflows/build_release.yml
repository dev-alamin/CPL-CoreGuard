name: Generate Plugin ZIP
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      # 1. Install production dependencies (generates the vendor folder)
      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # 2. Bundle everything
      - name: Prepare Bundle
        run: |
          mkdir -p fatalflow
          # Copy folders
          cp -r src fatalflow/
          cp -r vendor fatalflow/
          cp -r languages fatalflow/
          # Copy files
          cp fatalflow.php fatalflow/
          cp readme.txt fatalflow/
          cp composer.json fatalflow/
          # Verify files exist in the bundle folder before zipping
          ls -R fatalflow/

      # 3. Create the actual ZIP
      - name: Create ZIP
        run: zip -r fatalflow.zip fatalflow/