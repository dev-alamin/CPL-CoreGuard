name: Generate Plugin ZIP

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Prepare Bundle
        run: |
          mkdir -p fatalflow
          # Copy core directories
          cp -r src fatalflow/
          cp -r vendor fatalflow/ || echo "Vendor folder not found, skipping..."
          cp -r languages fatalflow/

          # Copy core files
          cp fatalflow.php fatalflow/
          cp readme.txt fatalflow/
          cp composer.json fatalflow/

          if [ -f composer.lock ]; then
            cp composer.lock fatalflow/
          fi

          # Debug: Log the structure to the GitHub Console
          echo "Final ZIP Structure:"
          ls -R fatalflow/

      - name: Create ZIP
        run: zip -r fatalflow.zip fatalflow/

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: fatalflow.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}