name: Generate Plugin ZIP & Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Prepare Bundle
        run: |
          mkdir -p fatalflow
          # Copy everything into the bundle folder
          cp -r src fatalflow/
          cp -r vendor fatalflow/
          cp -r languages fatalflow/
          cp fatalflow.php fatalflow/
          cp readme.txt fatalflow/
          cp composer.json fatalflow/
          if [ -f composer.lock ]; then cp composer.lock fatalflow/; fi

      - name: Create ZIP
        run: zip -r fatalflow.zip fatalflow/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: fatalflow.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Deploy to WordPress.org SVN
        uses: 10up/action-wordpress-dot-org-deploy@v2.2.1
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: fatalflow
          BUILD_DIR: fatalflow/