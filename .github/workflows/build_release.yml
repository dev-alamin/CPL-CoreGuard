name: Generate Plugin ZIP
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      # 1. Physical installation of the production vendor folder
      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # 2. Bundle everything into a folder first (to control structure)
      # Added composer.json and any other .json files to the copy list
      - name: Prepare Bundle
        run: |
          mkdir -p fatalflow
          cp -r src vendor languages fatalflow.php readme.txt composer.json fatalflow/
          # If you have other specific JSON files, add them here:
          # cp config.json fatalflow/ 

      # 3. Create the actual ZIP
      # Using -r (recursive) and -9 (max compression)
      - name: Create ZIP
        run: zip -r9 fatalflow.zip fatalflow/