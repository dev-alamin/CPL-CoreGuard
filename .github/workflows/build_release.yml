steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Install Production Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # Use a dedicated ZIP action instead of the SVN deploy action for now
      - name: Build Plugin ZIP
        uses: thedoctor0/zip-release@main
        with:
          type: 'zip'
          filename: 'cpl-coreguard.zip'
          exclusions: '*.git* tests/ phpunit.xml phpcs.xml composer.json composer.lock'

      - name: Upload ZIP as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpl-coreguard-plugin
          path: cpl-coreguard.zip