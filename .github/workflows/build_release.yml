steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      # 1. Bake the vendor folder
      - name: Install Production Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # 2. Manual Zip (The "Old School" way is often the most reliable)
      # We move files to a temporary folder to ensure ONLY what we want is zipped.
      - name: Prepare and Zip
        run: |
          mkdir -p deploy/cpl-coreguard
          cp -r src deploy/cpl-coreguard/
          cp -r vendor deploy/cpl-coreguard/
          cp -r languages deploy/cpl-coreguard/
          cp cpl-coreguard.php deploy/cpl-coreguard/
          cp readme.txt deploy/cpl-coreguard/
          cd deploy && zip -r ../cpl-coreguard.zip cpl-coreguard/

      # 3. Upload the resulting zip
      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: cpl-coreguard-v1.0.2
          path: cpl-coreguard.zip