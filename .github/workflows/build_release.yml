name: Generate Plugin ZIP
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      # 1. Physical installation of the production vendor folder
      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # 2. Bundle everything into a folder first (to control structure)
      - name: Prepare Bundle
        run: |
          mkdir -p cpl-coreguard
          cp -r src vendor languages cpl-coreguard.php readme.txt cpl-coreguard/

      # 3. Create the actual ZIP
      - name: Create ZIP
        run: zip -r cpl-coreguard.zip cpl-coreguard/

      # 4. Create a GitHub Release and attach the ZIP
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: cpl-coreguard.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}